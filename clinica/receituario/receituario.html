<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receituário — Dr. Mario Mariano</title>
<style>
  :root {
    --bg: #F6F8F8;
    --panel: #FFFFFF;
    --border: #DDE4E5;
    --ink: #1E2E30;
    --ink-soft: #5C7072;
    --teal: #1D5FA8;
    --teal-dark: #123E6E;
    --teal-soft: #E5EEF8;
    --amber: #B4732A;
    --amber-soft: #FBEEDF;
    --danger: #B33A3A;
    --danger-soft: #F8E7E7;
    --success: #1F7A4D;
    --success-soft: #E4F3EB;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(15,40,38,0.06), 0 4px 14px rgba(15,40,38,0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto auto 1fr;
    height: 100vh;
  }
  .app.tool-mode {
    grid-template-columns: 1fr;
  }
  header {
    grid-row: 1;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 22px;
    background: var(--teal-dark);
    color: white;
    flex-wrap: wrap;
  }
  header .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  header .brand strong {
    font-size: 16px;
    letter-spacing: 0.2px;
  }
  header .brand span {
    font-size: 12px;
    color: #C9DCF0;
  }
  .tabs {
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    padding: 4px;
    border-radius: 8px;
  }
  .tabs button {
    border: none;
    background: transparent;
    color: #E9F0FA;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tabs button.active {
    background: white;
    color: var(--teal-dark);
  }
  .search-wrap {
    grid-row: 2;
    grid-column: 1 / -1;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    row-gap: 10px;
    align-items: center;
  }
  .toolbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-left: auto;
  }
  .app.tool-mode .search-wrap { display: none; }
  .app.tool-mode aside { display: none; }
  .search-wrap input {
    flex: 1;
    max-width: 480px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .search-meta { font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  .btn-ghost {
    border: 1px solid var(--border);
    background: white;
    color: var(--ink-soft);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal-dark); }

  main {
    grid-row: 3;
    grid-column: 1;
    overflow-y: auto;
    padding: 18px 22px 90px;
  }
  .category {
    margin-bottom: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .category-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .category-head:hover { background: #FAFBFD; }
  .category-head h3 {
    margin: 0;
    font-size: 13.5px;
    letter-spacing: 0.4px;
    color: var(--teal-dark);
    text-transform: uppercase;
  }
  .category-select-all {
    font-size: 11.5px;
    color: var(--teal-dark);
    background: var(--teal-soft);
    border: none;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
  }
  .category-select-all:hover { background: var(--teal); color: white; }
  .chev {
    color: var(--ink-soft);
    transition: transform 0.15s ease;
    font-size: 11px;
  }
  .category.open .chev { transform: rotate(90deg); }
  .category-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .category.open .category-body { display: block; }
  .item {
    display: flex;
    gap: 12px;
    padding: 11px 16px;
    border-top: 1px solid #EFF3F3;
    cursor: pointer;
  }
  .item:first-child { border-top: none; }
  .item:hover { background: #FAFBFD; }
  .item.selected { background: var(--teal-soft); }
  .item.static { cursor: default; }
  .item .box {
    flex: 0 0 18px;
    width: 18px; height: 18px;
    margin-top: 2px;
    border-radius: 5px;
    border: 1.5px solid #B9C6D6;
    display: flex; align-items: center; justify-content: center;
    background: white;
  }
  .item.selected .box {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
    font-size: 12px;
    font-weight: bold;
  }
  .item .text { flex: 1; min-width: 0; }
  .item .nome { font-size: 14px; font-weight: 600; color: var(--ink); }
  .item .linha { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.45; }
  .item .linha.aviso { color: var(--amber); font-weight: 500; }
  .item .obs {
    font-size: 11.5px;
    font-style: italic;
    color: var(--ink-soft);
    background: #EEF2F8;
    border-left: 2px solid #B9C6D6;
    border-radius: 4px;
    padding: 4px 8px;
    margin-top: 5px;
  }
  .item .obs .obs-tag {
    font-style: normal;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-right: 4px;
  }
  mark { background: #FFE4A8; color: inherit; border-radius: 3px; padding: 0 1px; }

  aside {
    grid-row: 3;
    grid-column: 2;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside .aside-head {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  aside .aside-head .title {
    font-size: 13px;
    font-weight: 700;
    color: var(--teal-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  aside .aside-head .sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .selected-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
  }
  .sel-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    background: #FAFBFD;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    margin-bottom: 7px;
  }
  .sel-item .num {
    flex: 0 0 20px;
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    background: var(--teal-soft);
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .sel-item .body { flex: 1; min-width: 0; }
  .sel-item .nome { font-size: 13px; font-weight: 600; }
  .sel-item .cat { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .sel-item .actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sel-item .actions button {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .sel-item .actions button:hover { background: var(--border); color: var(--ink); }
  .sel-item .actions button.remove:hover { background: #F6DADA; color: var(--danger); }
  .empty-hint {
    padding: 30px 18px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    line-height: 1.6;
  }
  .copy-btn {
    background: var(--teal);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .copy-btn:hover { background: var(--teal-dark); }
  .copy-btn.copied { background: #2E8B57; }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Escores de risco cardiovascular */
  .risk-wrap {
    max-width: 1180px;
    margin: 28px auto;
    padding: 0 28px;
  }
  .risk-wrap h2 {
    margin: 0 0 2px;
    font-size: 16px;
    color: var(--teal-dark);
  }
  .risk-wrap .risk-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .risk-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .risk-col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }
  .risk-col h3 {
    margin: 0 0 1px;
    font-size: 13.5px;
    color: var(--teal-dark);
  }
  .risk-col .risk-col-sub {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .risk-items {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 10px;
  }
  .risk-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 6px;
    cursor: pointer;
  }
  .risk-item:hover { background: var(--teal-soft); }
  .risk-item input {
    margin-top: 2px;
    width: 14px;
    height: 14px;
    accent-color: var(--teal);
    flex-shrink: 0;
    cursor: pointer;
  }
  .risk-item .risk-item-label {
    font-size: 12px;
    line-height: 1.25;
  }
  .risk-item .risk-item-hint {
    display: block;
    font-size: 10.5px;
    color: var(--ink-soft);
    margin-top: 1px;
  }
  .imc-compact-fields {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .imc-compact-field { flex: 1; }
  .imc-compact-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .imc-compact-field input {
    width: 100%;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  .imc-compact-field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .risk-result {
    margin-top: auto;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    background: var(--teal-soft);
  }
  .risk-result .valor {
    font-size: 24px;
    font-weight: 800;
    color: var(--teal-dark);
    line-height: 1;
  }
  .risk-result .classe {
    margin-top: 3px;
    font-size: 12px;
    font-weight: 700;
  }
  .risk-result .risco {
    margin-top: 1px;
    font-size: 11px;
    font-weight: 700;
  }
  .risk-result .pct {
    margin-top: 2px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .risk-result.low { background: var(--success-soft); }
  .risk-result.low .classe, .risk-result.low .risco { color: var(--success); }
  .risk-result.mid { background: var(--amber-soft); }
  .risk-result.mid .classe, .risk-result.mid .risco { color: var(--amber); }
  .risk-result.high { background: var(--danger-soft); }
  .risk-result.high .classe, .risk-result.high .risco { color: var(--danger); }

  /* Gestante / Lactação — referência */
  .gestante-wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 28px 60px;
  }
  .gestante-wrap h2 {
    margin: 0 0 2px;
    font-size: 16px;
    color: var(--teal-dark);
  }
  .gestante-wrap .risk-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .gestante-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .gestante-toolbar input {
    flex: 1;
    min-width: 200px;
    max-width: 420px;
    padding: 9px 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
  }
  .gestante-toolbar input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .gest-cat-nota {
    font-size: 12px;
    font-style: italic;
    color: var(--ink-soft);
    padding: 8px 16px 0;
  }
  .gest-cat-nota-final {
    font-size: 12px;
    font-style: italic;
    color: var(--ink-soft);
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
  }
  .gest-table-wrap { overflow-x: visible; }
  table.gest-table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  table.gest-table th, table.gest-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #EFF3F3;
    text-align: left;
    vertical-align: top;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
    white-space: normal;
  }
  table.gest-table thead th {
    background: var(--teal-soft);
    color: var(--teal-dark);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  table.gest-table tbody tr:last-child td { border-bottom: none; }
  table.gest-table tbody tr:hover { background: #FAFBFD; }
  .gest-nome { font-weight: 600; color: var(--ink); white-space: normal; }
  .gest-obs { color: var(--ink-soft); }
  .gest-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 700;
    white-space: normal;
  }
  .gest-badge.yes { background: var(--success-soft); color: var(--success); }
  .gest-badge.no { background: var(--danger-soft); color: var(--danger); }
  .gest-badge.caution { background: var(--amber-soft); color: var(--amber); }
  .gest-badge.neutral { background: #EEF2F8; color: var(--ink-soft); }
  .cod-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .cod-item:last-child { border-bottom: none; }
  .cod-item:hover { background: var(--teal-soft); }
  .cod-code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--teal-dark);
    background: var(--teal-soft);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cod-desc {
    flex: 1;
    font-size: 13.5px;
    color: var(--ink);
  }
  .cod-copied-tag {
    font-size: 12px;
    font-weight: 600;
    color: var(--success);
    flex-shrink: 0;
    min-width: 64px;
    text-align: right;
  }
  .cod-item.cod-copied-flash { background: var(--success-soft); }
  .cod-star {
    border: none;
    background: transparent;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    color: #C7CED0;
    padding: 2px 4px;
    flex-shrink: 0;
    border-radius: 6px;
    transition: color 0.15s ease, transform 0.1s ease;
  }
  .cod-star:hover { color: #F0B429; transform: scale(1.15); }
  .cod-star.active { color: #F0B429; }
  .cod-fav-section {
    margin-bottom: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 0 2px;
  }
  .cod-fav-section h3 {
    margin: 0;
    padding: 10px 16px 6px;
    font-size: 13px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--teal-dark);
  }
  .cod-fav-section .cod-item { padding: 8px 16px; }
  .cod-fav-body { display: block; }
  .cod-fav-empty {
    padding: 10px 16px 14px;
    font-size: 13px;
    color: var(--ink-soft);
  }

  @media (max-width: 1100px) {
    .risk-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    aside { display: none; }
    .risk-grid { grid-template-columns: 1fr; }
    .imc-compact-fields { flex-direction: column; }
    table.gest-table { font-size: 11.5px; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="brand">
      <strong>Dr. Mario Augusto Mariano — CRM-PR 34.819</strong>
      <span>Receituário rápido de cardiologia</span>
    </div>
    <div class="tabs">
      <button class="active" data-tab="cardio">Cardio</button>
      <button data-tab="pa">PA</button>
      <button data-tab="gestante">Gestante</button>
      <button data-tab="escores">Escores</button>
      <button data-tab="contatos">Contatos</button>
      <button data-tab="codigos">CBHPM</button>
    </div>
  </header>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="Buscar medicamento, princípio ativo ou categoria...">
    <button class="btn-ghost" id="expandAll">Expandir tudo</button>
    <button class="btn-ghost" id="collapseAll">Recolher tudo</button>
    <span class="search-meta" id="searchMeta"></span>
    <div class="toolbar-actions">
      <button class="copy-btn" id="copyBtn">Copiar receita</button>
      <button class="clear-btn" id="clearBtn">Limpar seleção</button>
    </div>
  </div>

  <main id="main"></main>

  <aside id="aside">
    <div class="aside-head">
      <div class="title">Receita em montagem</div>
      <div class="sub" id="selCount">Nenhum item selecionado</div>
    </div>
    <div class="selected-list" id="selectedList"></div>
  </aside>

}

function currentData() {
  if (activeTab === 'cardio') return CARDIO;
  if (activeTab === 'pa') return PA;
  if (activeTab === 'contatos') return CONTATOS;
  return [];
}

// Retorna os índices das categorias na ordem em que devem ser exibidas.
// PA: alfabética (ignorando acentos), com MEDICAÇÕES fixada por último.
// Contatos: alfabética (ignorando acentos), sem categoria fixada.
// Cardio: ordem original do JSON.
function categoryOrder(dataset, data) {
  const idxs = data.map((c, i) => i);
  if (dataset !== 'pa' && dataset !== 'contatos') return idxs;
  const pinned = [];
  const rest = [];
  idxs.forEach(i => {
    if (dataset === 'pa' && normalize(data[i].categoria) === normalize('MEDICAÇÕES')) pinned.push(i);
    else rest.push(i);
  });
  rest.sort((a, b) => normalize(data[a].categoria).localeCompare(normalize(data[b].categoria)));
  return rest.concat(pinned);
}

function itemKey(dataset, ci, ii) { return dataset + '-' + ci + '-' + ii; }

function isSelected(dataset, ci, ii) {
  return selected.some(s => s.dataset === dataset && s.catIndex === ci && s.itemIndex === ii);
}

function toggleItem(dataset, ci, ii) {
  const data = dataset === 'cardio' ? CARDIO : dataset === 'pa' ? PA : CONTATOS;
  const cat = data[ci];
  const item = cat.itens[ii];
  const idx = selected.findIndex(s => s.dataset === dataset && s.catIndex === ci && s.itemIndex === ii);
  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    selected.push({ dataset, catIndex: ci, itemIndex: ii, nome: item.nome, linhas: item.linhas, categoria: cat.categoria });
  }
  renderMain();
  renderSelected();
}

function selectAllInCategory(dataset, ci, iis) {
  const data = dataset === 'cardio' ? CARDIO : dataset === 'pa' ? PA : CONTATOS;
  const cat = data[ci];
  iis.forEach(ii => {
    if (!isSelected(dataset, ci, ii)) {
      const item = cat.itens[ii];
      selected.push({ dataset, catIndex: ci, itemIndex: ii, nome: item.nome, linhas: item.linhas, categoria: cat.categoria });
    }
  });
  renderMain();
  renderSelected();
}

function removeSelected(pos) {
  selected.splice(pos, 1);
  renderMain();
  renderSelected();
}

function moveSelected(pos, dir) {
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= selected.length) return;
  const tmp = selected[pos];
  selected[pos] = selected[newPos];
  selected[newPos] = tmp;
  renderSelected();
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const norm = normalize(text);
  const nq = normalize(q);
  const idx = norm.indexOf(nq);
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function isAviso(line) {
  return line.startsWith('*') || line.toLowerCase().includes('proibido') || line.toLowerCase().includes('nao pode ser partido') || line.toLowerCase().includes('não pode ser partido');
}

function renderMain() {
  const app = document.getElementById('app');
  app.classList.toggle('tool-mode', activeTab === 'escores' || activeTab === 'gestante' || activeTab === 'codigos');

  if (activeTab === 'escores') {
    renderEscoresTab();
    return;
  }

  if (activeTab === 'gestante') {
    renderGestanteTab();
    return;
  }

  if (activeTab === 'codigos') {
    renderCodigosTab();
    return;
  }

  const main = document.getElementById('main');
  const q = document.getElementById('search').value.trim();
  const nq = normalize(q);
  const data = currentData();
  main.innerHTML = '';

  let totalMatches = 0;
  const order = categoryOrder(activeTab, data);

  order.forEach(ci => {
    const cat = data[ci];
    const matchingItems = [];
    cat.itens.forEach((item, ii) => {
      const hay = normalize(item.nome + ' ' + cat.categoria + ' ' + item.linhas.join(' ') + ' ' + (item.obs ? item.obs.join(' ') : ''));
      if (!nq || hay.includes(nq)) {
        matchingItems.push(ii);
      }
    });
    if (matchingItems.length === 0) return;
    totalMatches += matchingItems.length;

    const key = activeTab + '-' + ci;
    const isOpen = nq ? true : openCats.has(key);

    const catDiv = document.createElement('div');
    catDiv.className = 'category' + (isOpen ? ' open' : '');

    const showSelectAll = activeTab === 'pa' && normalize(cat.categoria) !== normalize('MEDICAÇÕES');
    const head = document.createElement('div');
    head.className = 'category-head';
    head.innerHTML = '<h3>' + escapeHtml(cat.categoria) + '</h3><div style="display:flex;align-items:center;gap:8px;">' + (showSelectAll ? '<button type="button" class="category-select-all">Selecionar tudo</button>' : '') + '<span class="chev">▶</span></div>';
    head.addEventListener('click', () => {
      if (openCats.has(key)) openCats.delete(key); else openCats.add(key);
      renderMain();
    });
    if (showSelectAll) {
      const selAllBtn = head.querySelector('.category-select-all');
      selAllBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectAllInCategory(activeTab, ci, matchingItems);
      });
    }
    catDiv.appendChild(head);

    const body = document.createElement('div');
    body.className = 'category-body';

    matchingItems.forEach(ii => {
      const item = cat.itens[ii];
      const row = document.createElement('div');
      const sel = isSelected(activeTab, ci, ii);
      row.className = 'item' + (sel ? ' selected' : '');
      let linhasHtml = item.linhas.map(l => '<div class="linha' + (isAviso(l) ? ' aviso' : '') + '">' + highlight(l, q) + '</div>').join('');
      let obsHtml = (item.obs && item.obs.length) ? item.obs.map(o => '<div class="obs"><span class="obs-tag">Obs.:</span>' + highlight(o, q) + '</div>').join('') : '';
      row.innerHTML = '<div class="box">' + (sel ? '✓' : '') + '</div><div class="text"><div class="nome">' + highlight(item.nome, q) + '</div>' + linhasHtml + obsHtml + '</div>';
      row.addEventListener('click', () => toggleItem(activeTab, ci, ii));
      body.appendChild(row);
    });

    catDiv.appendChild(body);
    main.appendChild(catDiv);
  });

  document.getElementById('searchMeta').textContent = q ? (totalMatches + ' resultado(s)') : '';

  if (data.length && totalMatches === 0 && q) {
    main.innerHTML = '<div class="empty-hint">Nenhum item encontrado para "' + escapeHtml(q) + '".</div>';
  }
}

const IMC_RANGES = [
  { min: -Infinity, max: 18.5, label: 'Abaixo do peso' },
  { min: 18.5, max: 25, label: 'Peso normal' },
  { min: 25, max: 30, label: 'Sobrepeso' },
  { min: 30, max: 35, label: 'Obesidade Grau I' },
  { min: 35, max: 40, label: 'Obesidade Grau II' },
  { min: 40, max: Infinity, label: 'Obesidade Grau III (mórbida)' }
];

function classifyImc(v) {
  return IMC_RANGES.find(r => v >= r.min && v < r.max) || IMC_RANGES[IMC_RANGES.length - 1];
}

function imcTier(label) {
  if (label === 'Peso normal') return 'low';
  if (label === 'Abaixo do peso' || label === 'Sobrepeso') return 'mid';
  return 'high';
}

const RCRI_ITEMS = [
  { id: 'rcri_cirurgia', label: 'Cirurgia de alto risco', hint: 'Intraperitoneal, intratorácica ou vascular suprainguinal' },
  { id: 'rcri_isquemica', label: 'Cardiopatia isquêmica', hint: 'IAM prévio, teste ergométrico positivo, dor torácica isquêmica atual, uso de nitrato ou onda Q patológica no ECG' },
  { id: 'rcri_ic', label: 'Insuficiência cardíaca congestiva', hint: 'História de ICC' },
  { id: 'rcri_avc', label: 'Doença cerebrovascular', hint: 'AVC ou AIT prévio' },
  { id: 'rcri_insulina', label: 'Uso pré-operatório de insulina', hint: '' },
  { id: 'rcri_creatinina', label: 'Creatinina pré-operatória > 2,0 mg/dL', hint: '' }
];

const AUB_ITEMS = [
  { id: 'aub_idade', label: 'Idade ≥ 75 anos', hint: '' },
  { id: 'aub_hb', label: 'Hemoglobina < 12 g/dL', hint: '' },
  { id: 'aub_cardiopatia', label: 'História de cardiopatia', hint: 'IAM prévio, angioplastia, cirurgia cardíaca, IC, FA ou valvopatia moderada/grave ao ecocardiograma' },
  { id: 'aub_sintomas', label: 'Angina ou dispneia', hint: '' },
  { id: 'aub_vascular', label: 'Cirurgia vascular', hint: '' },
  { id: 'aub_urgencia', label: 'Cirurgia de urgência/emergência', hint: '' }
];

function rcriResult(score) {
  if (score === 0) return { classe: 'Classe I', risco: 'Risco baixo', pct: '≈ 0,4%', tier: 'low' };
  if (score === 1) return { classe: 'Classe II', risco: 'Risco baixo', pct: '≈ 0,9%', tier: 'low' };
  if (score === 2) return { classe: 'Classe III', risco: 'Risco intermediário', pct: '≈ 6,6%', tier: 'mid' };
  return { classe: 'Classe IV', risco: 'Risco alto', pct: '≈ 11%', tier: 'high' };
}

function aubResult(score) {
  if (score <= 1) return { classe: 'Risco baixo', pct: '≈ 0,3 – 2,3%', tier: 'low' };
  if (score <= 3) return { classe: 'Risco intermediário', pct: '≈ 5,2 – 10,1%', tier: 'mid' };
  return { classe: 'Risco alto', pct: '≈ 21,7%', tier: 'high' };
}

function riskItemsHtml(items) {
  return '<div class="risk-items">' +
    items.map(it =>
      '<label class="risk-item">' +
        '<input type="checkbox" id="' + it.id + '">' +
        '<span class="risk-item-label">' + escapeHtml(it.label) +
          (it.hint ? '<span class="risk-item-hint">' + escapeHtml(it.hint) + '</span>' : '') +
        '</span>' +
      '</label>'
    ).join('') +
  '</div>';
}

function renderRiskScores(container) {
  container.innerHTML =
    '<h2>Escores de Risco Cardiovascular Perioperatório</h2>' +
    '<div class="risk-sub">IMC e estratificação de risco para complicações cardíacas em cirurgia não cardíaca.</div>' +
    '<div class="risk-grid">' +
      '<div class="risk-col" id="imcCol">' +
        '<h3>IMC</h3>' +
        '<div class="risk-col-sub">Índice de Massa Corporal</div>' +
        '<div class="imc-compact-fields">' +
          '<div class="imc-compact-field"><label for="imcPeso">Peso (kg)</label><input id="imcPeso" type="number" step="0.1" min="0" placeholder="Ex: 78.5"></div>' +
          '<div class="imc-compact-field"><label for="imcAltura">Altura (cm)</label><input id="imcAltura" type="number" step="0.1" min="0" placeholder="Ex: 172"></div>' +
        '</div>' +
        '<div class="risk-result" id="imcResult"><div class="valor">—</div><div class="classe">Informe peso e altura</div></div>' +
      '</div>' +
      '<div class="risk-col" id="rcriCol">' +
        '<h3>RCRI (Lee)</h3>' +
        '<div class="risk-col-sub">Índice de Risco Cardíaco Revisado</div>' +
        riskItemsHtml(RCRI_ITEMS) +
        '<div class="risk-result" id="rcriResult"><div class="valor">0</div><div class="classe">Classe I</div><div class="risco">Risco baixo</div><div class="pct">≈ 0,4%</div></div>' +
      '</div>' +
      '<div class="risk-col" id="aubCol">' +
        '<h3>AUB-HAS2</h3>' +
        '<div class="risk-col-sub">American University of Beirut Cardiovascular Risk Index</div>' +
        riskItemsHtml(AUB_ITEMS) +
        '<div class="risk-result" id="aubResultBox"><div class="valor">0</div><div class="classe">Risco baixo</div><div class="pct">≈ 0,3 – 2,3%</div></div>' +
      '</div>' +
    '</div>';

  function wire(items, resultBoxId, calcFn) {
    const box = document.getElementById(resultBoxId);
    function update() {
      const score = items.reduce((acc, it) => acc + (document.getElementById(it.id).checked ? 1 : 0), 0);
      const r = calcFn(score);
      box.className = 'risk-result ' + r.tier;
      box.innerHTML = '<div class="valor">' + score + '</div>' +
        '<div class="classe">' + r.classe + '</div>' +
        (r.risco ? '<div class="risco">' + r.risco + '</div>' : '') +
        '<div class="pct">' + r.pct + '</div>';
    }
    items.forEach(it => document.getElementById(it.id).addEventListener('change', update));
    update();
  }

  wire(RCRI_ITEMS, 'rcriResult', rcriResult);
  wire(AUB_ITEMS, 'aubResultBox', aubResult);

  const pesoEl = document.getElementById('imcPeso');
  const alturaEl = document.getElementById('imcAltura');
  const imcResultEl = document.getElementById('imcResult');

  function updateImc() {
    const peso = parseFloat(pesoEl.value);
    const alturaCm = parseFloat(alturaEl.value);
    if (!peso || !alturaCm || peso <= 0 || alturaCm <= 0) {
      imcResultEl.className = 'risk-result';
      imcResultEl.innerHTML = '<div class="valor">—</div><div class="classe">Informe peso e altura</div>';
      return;
    }
    const alturaM = alturaCm / 100;
    const imc = peso / (alturaM * alturaM);
    const cls = classifyImc(imc);
    imcResultEl.className = 'risk-result ' + imcTier(cls.label);
    imcResultEl.innerHTML = '<div class="valor">' + imc.toFixed(1) + '</div><div class="classe">' + cls.label + '</div>';
  }

  pesoEl.addEventListener('input', updateImc);
  alturaEl.addEventListener('input', updateImc);
}

function renderEscoresTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="risk-wrap" id="riskWrap"></div>';
  renderRiskScores(document.getElementById('riskWrap'));
}

function gestBadgeTier(text) {
  if (!text || text === '—') return 'neutral';
  const t = normalize(text.trim());
  if (t.startsWith('nao')) return 'no';
  if (t.includes('cautela') || t.includes('proprovavel') || t.includes('provavelmente') ||
      t.includes('risco/beneficio') || t.includes('porem')) return 'caution';
  if (t.startsWith('sim') || t.includes('compativel')) return 'yes';
  return 'neutral';
}

function renderGestanteCategories(container, query) {
  const nq = normalize(query || '');
  const cats = GESTANTE.categorias;
  container.innerHTML = '';
  let totalMatches = 0;

  cats.forEach((cat, ci) => {
    const matchingFarmacos = cat.farmacos.filter(fc => {
      const hay = normalize(fc.nome + ' ' + cat.categoria + ' ' + fc.valores.join(' '));
      return !nq || hay.includes(nq);
    });
    if (matchingFarmacos.length === 0) return;
    totalMatches += matchingFarmacos.length;

    const key = 'gestante-' + ci;
    const isOpen = nq ? true : openCats.has(key);

    const catDiv = document.createElement('div');
    catDiv.className = 'category' + (isOpen ? ' open' : '');

    const head = document.createElement('div');
    head.className = 'category-head';
    head.innerHTML = '<h3>' + escapeHtml(cat.categoria) + '</h3><div style="display:flex;align-items:center;gap:8px;"><span class="chev">▶</span></div>';
    head.addEventListener('click', () => {
      if (openCats.has(key)) openCats.delete(key); else openCats.add(key);
      renderGestanteCategories(container, document.getElementById('gestSearch').value);
    });
    catDiv.appendChild(head);

    const body = document.createElement('div');
    body.className = 'category-body';

    if (cat.nota) {
      const nota = document.createElement('div');
      nota.className = 'gest-cat-nota';
      nota.textContent = cat.nota;
      body.appendChild(nota);
    }

    const tableWrap = document.createElement('div');
    tableWrap.className = 'gest-table-wrap';
    const cols = cat.colunas;
    const hasBadge = cols.includes('Gestante') || cols.includes('Lactação');
    const numCols = cols.length + 1;
    const colWidthPct = (100 / numCols).toFixed(2) + '%';
    let colgroupHtml = '<colgroup>' + Array(numCols).fill('<col style="width:' + colWidthPct + '">').join('') + '</colgroup>';
    let theadHtml = '<thead><tr><th>Fármaco</th>' + cols.map(c => '<th>' + escapeHtml(c) + '</th>').join('') + '</tr></thead>';
    let tbodyHtml = '<tbody>' + matchingFarmacos.map(fc => {
      const cells = cols.map((colName, vi) => {
        const val = fc.valores[vi];
        if (hasBadge && (colName === 'Gestante' || colName === 'Lactação')) {
          const tier = gestBadgeTier(val);
          return '<td><span class="gest-badge ' + tier + '">' + highlight(val, query) + '</span></td>';
        }
        if (colName === 'Observações' || colName === 'Efeitos adversos / Observações') {
          return '<td class="gest-obs">' + highlight(val, query) + '</td>';
        }
        return '<td>' + highlight(val, query) + '</td>';
      }).join('');
      return '<tr><td class="gest-nome">' + highlight(fc.nome, query) + '</td>' + cells + '</tr>';
    }).join('') + '</tbody>';
    tableWrap.innerHTML = '<table class="gest-table">' + colgroupHtml + theadHtml + tbodyHtml + '</table>';
    body.appendChild(tableWrap);

    if (cat.notaFinal) {
      const notaFinal = document.createElement('div');
      notaFinal.className = 'gest-cat-nota-final';
      notaFinal.textContent = cat.notaFinal;
      body.appendChild(notaFinal);
    }

    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });

  document.getElementById('gestMeta').textContent = query ? (totalMatches + ' resultado(s)') : '';

  if (totalMatches === 0 && query) {
    container.innerHTML = '<div class="empty-hint">Nenhum item encontrado para "' + escapeHtml(query) + '".</div>';
  }
}

function copyCodigo(codigo, rowEl) {
  const done = () => {
    if (rowEl) {
      rowEl.classList.add('cod-copied-flash');
      const tag = rowEl.querySelector('.cod-copied-tag');
      if (tag) tag.textContent = 'Copiado!';
      setTimeout(() => {
        rowEl.classList.remove('cod-copied-flash');
        if (tag) tag.textContent = '';
      }, 1200);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(codigo).then(done).catch(() => fallbackCopyPlain(codigo, done));
  } else {
    fallbackCopyPlain(codigo, done);
  }
}

    container.appendChild(catDiv);
  });

  document.getElementById('codMeta').textContent = query ? (totalMatches + ' resultado(s)') : '';

  if (totalMatches === 0 && query) {
    container.innerHTML = '<div class="empty-hint">Nenhum código encontrado para "' + escapeHtml(query) + '".</div>';
  }
}

function refreshCodigosView() {
  const favContainer = document.getElementById('codFavoritos');
  const catContainer = document.getElementById('codCategories');
  if (!favContainer || !catContainer) return;
  renderCodigosFavoritos(favContainer);
  renderCodigosCategories(catContainer, document.getElementById('codSearch').value);
}

function renderCodigosTab() {
  const main = document.getElementById('main');
  main.innerHTML =
    '<div class="gestante-wrap" id="codigosWrap">' +
      '<h2>Tabela de Códigos CBHPM</h2>' +
      '<div class="risk-sub">Clique em um exame para copiar somente o código numérico. Clique na estrela para favoritar.</div>' +
      '<div class="gestante-toolbar">' +
        '<input id="codSearch" type="text" placeholder="Buscar exame ou código...">' +
        '<button class="btn-ghost" id="codExpandAll">Expandir tudo</button>' +
        '<button class="btn-ghost" id="codCollapseAll">Recolher tudo</button>' +
        '<span class="search-meta" id="codMeta"></span>' +
      '</div>' +
      '<div class="cod-fav-section">' +
        '<h3>★ Favoritos</h3>' +
        '<div id="codFavoritos"></div>' +
      '</div>' +
      '<div id="codCategories"></div>' +
    '</div>';

  const favContainer = document.getElementById('codFavoritos');
  const container = document.getElementById('codCategories');
  renderCodigosFavoritos(favContainer);
  renderCodigosCategories(container, '');

  document.getElementById('codSearch').addEventListener('input', (e) => {
    renderCodigosCategories(container, e.target.value);
  });
  document.getElementById('codExpandAll').addEventListener('click', () => {
    CODIGOS.forEach((c, ci) => openCats.add('codigos-' + ci));
    renderCodigosCategories(container, document.getElementById('codSearch').value);
  });
  document.getElementById('codCollapseAll').addEventListener('click', () => {
    CODIGOS.forEach((c, ci) => openCats.delete('codigos-' + ci));
    renderCodigosCategories(container, document.getElementById('codSearch').value);
  });
}

function renderSelected() {
  const list = document.getElementById('selectedList');
  const countEl = document.getElementById('selCount');
  list.innerHTML = '';

  if (selected.length === 0) {
    countEl.textContent = 'Nenhum item selecionado';
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.innerHTML = 'Marque itens na lista à esquerda.<br>Eles vão aparecer aqui, na ordem em que forem clicados, prontos para copiar de uma vez só.';
    list.appendChild(hint);
    return;
  }
  countEl.textContent = selected.length + ' item(ns) selecionado(s)';
  selected.forEach((s, pos) => {
    const div = document.createElement('div');
    div.className = 'sel-item';
    div.innerHTML = '<div class="num">' + (pos + 1) + '</div>' +
      '<div class="body"><div class="nome">' + escapeHtml(s.nome) + '</div><div class="cat">' + escapeHtml(s.categoria) + '</div></div>' +
      '<div class="actions">' +
        '<button title="Mover para cima" data-act="up">&#9650;</button>' +
        '<button title="Mover para baixo" data-act="down">&#9660;</button>' +
        '<button title="Remover" class="remove" data-act="rm">&times;</button>' +
      '</div>';
    div.querySelector('[data-act="up"]').addEventListener('click', (e) => { e.stopPropagation(); moveSelected(pos, -1); });
    div.querySelector('[data-act="down"]').addEventListener('click', (e) => { e.stopPropagation(); moveSelected(pos, 1); });
    div.querySelector('[data-act="rm"]').addEventListener('click', (e) => { e.stopPropagation(); removeSelected(pos); });
    list.appendChild(div);
  });
}

function buildText() {
  const corpo = selected.map(s => {
    return s.nome + '\n' + s.linhas.join('\n');
  }).join('\n\n');
  const somenteCardio = selected.length > 0 && selected.every(s => s.dataset === 'cardio');
  if (!somenteCardio) return corpo;
  return 'USO CONTÍNUO\n\n' + corpo;
}

function buildHtml() {
  const somenteCardio = selected.length > 0 && selected.every(s => s.dataset === 'cardio');
  const itemsHtml = selected.map(s => {
    const nomeEsc = escapeHtml(s.nome);
    const boldNome = (s.dataset === 'cardio' || s.dataset === 'pa');
    const nomeHtml = boldNome
      ? '<span style="font-weight: bold;"><b>' + nomeEsc + '</b></span>'
      : nomeEsc;
    const linhasHtml = s.linhas
      .map(l => '<span style="font-weight: normal;">' + escapeHtml(l) + '</span>')
      .join('<br>');
    return nomeHtml + (linhasHtml ? '<br>' + linhasHtml : '');
  }).join('<br><br>');
  const bodyHtml = somenteCardio ? ('USO CONTÍNUO<br><br>' + itemsHtml) : itemsHtml;
  return '<div style="font-family: Arial, sans-serif; font-size: 10pt; color: #000000;">' + bodyHtml + '</div>';
}

function copyToClipboard() {
  if (selected.length === 0) return;
  const text = buildText();
  const html = buildHtml();
  const btn = document.getElementById('copyBtn');
  const done = () => {
    const original = 'Copiar receita';
    btn.textContent = 'Copiado! (' + selected.length + ' itens)';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1800);
  };
  if (navigator.clipboard && typeof window.ClipboardItem === 'function') {
    try {
      const item = new ClipboardItem({
        'text/plain': new Blob([text], { type: 'text/plain' }),
        'text/html': new Blob([html], { type: 'text/html' })
      });
      navigator.clipboard.write([item]).then(done).catch(() => fallbackCopyRich(text, html, done));
    } catch (e) {
      fallbackCopyRich(text, html, done);
    }
  } else {
    fallbackCopyRich(text, html, done);
  }
}

function fallbackCopyRich(text, html, done) {
  const el = document.createElement('div');
  el.setAttribute('contenteditable', 'true');
  el.style.position = 'fixed';
  el.style.left = '-9999px';
  el.style.top = '0';
  el.style.whiteSpace = 'pre-wrap';
  el.innerHTML = html;
  document.body.appendChild(el);
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
  sel.removeAllRanges();
  document.body.removeChild(el);
  if (ok) {
    done();
  } else {
    fallbackCopyPlain(text, done);
  }
}

function fallbackCopyPlain(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); done(); } catch (e) { alert('Não foi possível copiar automaticamente. Selecione o texto manualmente.'); }
  document.body.removeChild(ta);
}

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('search').value = '';
    renderMain();
  });
});

document.getElementById('search').addEventListener('input', renderMain);
document.getElementById('expandAll').addEventListener('click', () => {
  currentData().forEach((c, ci) => openCats.add(activeTab + '-' + ci));
  renderMain();
});
document.getElementById('collapseAll').addEventListener('click', () => {
  currentData().forEach((c, ci) => openCats.delete(activeTab + '-' + ci));
  renderMain();
});
document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (selected.length === 0 && openCats.size === 0) return;
  selected = [];
  openCats.clear();
  const searchEl = document.getElementById('search');
  const gestSearchEl = document.getElementById('gestSearch');
  const codSearchEl = document.getElementById('codSearch');
  if (searchEl) searchEl.value = '';
  if (gestSearchEl) gestSearchEl.value = '';
  if (codSearchEl) codSearchEl.value = '';
  renderMain();
  renderSelected();
});

renderMain();
renderSelected();
</script>

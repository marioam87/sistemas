<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receituário — Dr. Mario Mariano</title>
<style>
  :root {
    --bg: #F6F8F8;
    --panel: #FFFFFF;
    --border: #DDE4E5;
    --ink: #1E2E30;
    --ink-soft: #5C7072;
    --teal: #1D5FA8;
    --teal-dark: #123E6E;
    --teal-soft: #E5EEF8;
    --amber: #B4732A;
    --amber-soft: #FBEEDF;
    --danger: #B33A3A;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(15,40,38,0.06), 0 4px 14px rgba(15,40,38,0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  .app.imc-mode {
    grid-template-columns: 1fr;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 22px;
    background: var(--teal-dark);
    color: white;
    flex-wrap: wrap;
  }
  header .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  header .brand strong {
    font-size: 16px;
    letter-spacing: 0.2px;
  }
  header .brand span {
    font-size: 12px;
    color: #CFEAE4;
  }
  .tabs {
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    padding: 4px;
    border-radius: 8px;
  }
  .tabs button {
    border: none;
    background: transparent;
    color: #E4F4F0;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tabs button.active {
    background: white;
    color: var(--teal-dark);
  }
  .search-wrap {
    grid-column: 1 / -1;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .app.imc-mode .search-wrap { display: none; }
  .app.imc-mode aside { display: none; }
  .search-wrap input {
    flex: 1;
    max-width: 480px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .search-meta { font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  .btn-ghost {
    border: 1px solid var(--border);
    background: white;
    color: var(--ink-soft);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal-dark); }

  main {
    overflow-y: auto;
    padding: 18px 22px 90px;
  }
  .category {
    margin-bottom: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .category-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .category-head:hover { background: #FAFCFC; }
  .category-head h3 {
    margin: 0;
    font-size: 13.5px;
    letter-spacing: 0.4px;
    color: var(--teal-dark);
    text-transform: uppercase;
  }
  .category-count {
    font-size: 11.5px;
    color: var(--ink-soft);
    background: var(--teal-soft);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .chev {
    color: var(--ink-soft);
    transition: transform 0.15s ease;
    font-size: 11px;
  }
  .category.open .chev { transform: rotate(90deg); }
  .category-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .category.open .category-body { display: block; }
  .item {
    display: flex;
    gap: 12px;
    padding: 11px 16px;
    border-top: 1px solid #EFF3F3;
    cursor: pointer;
  }
  .item:first-child { border-top: none; }
  .item:hover { background: #FAFCFC; }
  .item.selected { background: var(--teal-soft); }
  .item.static { cursor: default; }
  .item .box {
    flex: 0 0 18px;
    width: 18px; height: 18px;
    margin-top: 2px;
    border-radius: 5px;
    border: 1.5px solid #B7C6C7;
    display: flex; align-items: center; justify-content: center;
    background: white;
  }
  .item.selected .box {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
    font-size: 12px;
    font-weight: bold;
  }
  .item .text { flex: 1; min-width: 0; }
  .item .nome { font-size: 14px; font-weight: 600; color: var(--ink); }
  .item .linha { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.45; }
  .item .linha.aviso { color: var(--amber); font-weight: 500; }
  .item .obs {
    font-size: 11.5px;
    font-style: italic;
    color: var(--ink-soft);
    background: #F0F4F4;
    border-left: 2px solid #B7C6C7;
    border-radius: 4px;
    padding: 4px 8px;
    margin-top: 5px;
  }
  .item .obs .obs-tag {
    font-style: normal;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-right: 4px;
  }
  mark { background: #FFE4A8; color: inherit; border-radius: 3px; padding: 0 1px; }

  aside {
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside .aside-head {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  aside .aside-head .title {
    font-size: 13px;
    font-weight: 700;
    color: var(--teal-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  aside .aside-head .sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .selected-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
  }
  .uso-continuo {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--teal-dark);
    background: var(--teal-soft);
    border: 1px solid #C7E4DE;
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 9px;
    text-align: center;
  }
  .sel-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    background: #FAFCFC;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    margin-bottom: 7px;
  }
  .sel-item .num {
    flex: 0 0 20px;
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    background: var(--teal-soft);
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .sel-item .body { flex: 1; min-width: 0; }
  .sel-item .nome { font-size: 13px; font-weight: 600; }
  .sel-item .cat { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .sel-item .actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sel-item .actions button {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .sel-item .actions button:hover { background: var(--border); color: var(--ink); }
  .sel-item .actions button.remove:hover { background: #F6DADA; color: var(--danger); }
  .empty-hint {
    padding: 30px 18px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    line-height: 1.6;
  }
  .aside-foot {
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .copy-btn {
    background: var(--teal);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 9px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: var(--shadow);
  }
  .copy-btn:hover { background: var(--teal-dark); }
  .copy-btn.copied { background: #2E8B57; }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    padding: 9px;
    border-radius: 9px;
    font-size: 13px;
    cursor: pointer;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* IMC */
  .imc-wrap {
    max-width: 560px;
    margin: 40px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .imc-wrap h2 {
    margin: 0 0 4px;
    font-size: 18px;
    color: var(--teal-dark);
  }
  .imc-wrap .imc-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }
  .imc-fields {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
  }
  .imc-field { flex: 1; }
  .imc-field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .imc-field input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
  }
  .imc-field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .imc-result {
    text-align: center;
    padding: 20px;
    border-radius: 10px;
    background: var(--teal-soft);
    margin-bottom: 20px;
  }
  .imc-result .valor {
    font-size: 40px;
    font-weight: 800;
    color: var(--teal-dark);
    line-height: 1;
  }
  .imc-result .classe {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 700;
  }
  .imc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .imc-table th, .imc-table td {
    text-align: left;
    padding: 7px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--ink-soft);
  }
  .imc-table th { color: var(--teal-dark); font-size: 11.5px; text-transform: uppercase; }
  .imc-table tr.active-range td { color: var(--ink); font-weight: 700; background: var(--teal-soft); }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr auto; }
    aside { border-left: none; border-top: 1px solid var(--border); max-height: 40vh; }
    .imc-fields { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="brand">
      <strong>Dr. Mario Augusto Mariano — CRM-PR 34.819</strong>
      <span>Receituário rápido de cardiologia</span>
    </div>
    <div class="tabs">
      <button class="active" data-tab="cardio">Cardio</button>
      <button data-tab="pa">PA</button>
      <button data-tab="imc">IMC</button>
      <button data-tab="contatos">Contatos</button>
    </div>
  </header>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="Buscar medicamento, princípio ativo ou categoria...">
    <button class="btn-ghost" id="expandAll">Expandir tudo</button>
    <button class="btn-ghost" id="collapseAll">Recolher tudo</button>
    <span class="search-meta" id="searchMeta"></span>
  </div>

  <main id="main"></main>

  <aside id="aside">
    <div class="aside-head">
      <div class="title">Receita em montagem</div>
      <div class="sub" id="selCount">Nenhum item selecionado</div>
    </div>
    <div class="selected-list" id="selectedList"></div>
    <div class="aside-foot">
      <button class="copy-btn" id="copyBtn">Copiar receita</button>
      <button class="clear-btn" id="clearBtn">Limpar seleção</button>
    </div>
  </aside>
</div>

let activeTab = 'cardio';
let selected = []; // {catIndex, itemIndex, dataset:'cardio'|'pa'|'contatos', nome, linhas, categoria}
let openCats = new Set(); // keys "dataset-catIndex"

function normalize(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function currentData() {
  if (activeTab === 'cardio') return CARDIO;
  if (activeTab === 'pa') return PA;
  if (activeTab === 'contatos') return CONTATOS;
  return [];
}

// Retorna os índices das categorias na ordem em que devem ser exibidas.
// PA: alfabética (ignorando acentos), com MEDICAÇÕES fixada por último.
// Cardio e Contatos: ordem original do JSON.
function categoryOrder(dataset, data) {
  const idxs = data.map((c, i) => i);
  if (dataset !== 'pa') return idxs;
  const pinned = [];
  const rest = [];
  idxs.forEach(i => {
    if (normalize(data[i].categoria) === normalize('MEDICAÇÕES')) pinned.push(i);
    else rest.push(i);
  });
  rest.sort((a, b) => normalize(data[a].categoria).localeCompare(normalize(data[b].categoria)));
  return rest.concat(pinned);
}

function itemKey(dataset, ci, ii) { return dataset + '-' + ci + '-' + ii; }

function isSelected(dataset, ci, ii) {
  return selected.some(s => s.dataset === dataset && s.catIndex === ci && s.itemIndex === ii);
}

function toggleItem(dataset, ci, ii) {
  const data = dataset === 'cardio' ? CARDIO : dataset === 'pa' ? PA : CONTATOS;
  const cat = data[ci];
  const item = cat.itens[ii];
  const idx = selected.findIndex(s => s.dataset === dataset && s.catIndex === ci && s.itemIndex === ii);
  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    selected.push({ dataset, catIndex: ci, itemIndex: ii, nome: item.nome, linhas: item.linhas, categoria: cat.categoria });
  }
  renderMain();
  renderSelected();
}

function removeSelected(pos) {
  selected.splice(pos, 1);
  renderMain();
  renderSelected();
}

function moveSelected(pos, dir) {
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= selected.length) return;
  const tmp = selected[pos];
  selected[pos] = selected[newPos];
  selected[newPos] = tmp;
  renderSelected();
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const norm = normalize(text);
  const nq = normalize(q);
  const idx = norm.indexOf(nq);
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function isAviso(line) {
  return line.startsWith('*') || line.toLowerCase().includes('proibido') || line.toLowerCase().includes('nao pode ser partido') || line.toLowerCase().includes('não pode ser partido');
}

function renderMain() {
  const app = document.getElementById('app');
  app.classList.toggle('imc-mode', activeTab === 'imc');

  if (activeTab === 'imc') {
    renderImc();
    return;
  }

  const main = document.getElementById('main');
  const q = document.getElementById('search').value.trim();
  const nq = normalize(q);
  const data = currentData();
  main.innerHTML = '';

  let totalMatches = 0;
  const order = categoryOrder(activeTab, data);

  order.forEach(ci => {
    const cat = data[ci];
    const matchingItems = [];
    cat.itens.forEach((item, ii) => {
      const hay = normalize(item.nome + ' ' + cat.categoria + ' ' + item.linhas.join(' ') + ' ' + (item.obs ? item.obs.join(' ') : ''));
      if (!nq || hay.includes(nq)) {
        matchingItems.push(ii);
      }
    });
    if (matchingItems.length === 0) return;
    totalMatches += matchingItems.length;

    const key = activeTab + '-' + ci;
    const isOpen = nq ? true : openCats.has(key);

    const catDiv = document.createElement('div');
    catDiv.className = 'category' + (isOpen ? ' open' : '');

    const head = document.createElement('div');
    head.className = 'category-head';
    head.innerHTML = '<h3>' + escapeHtml(cat.categoria) + '</h3><div style="display:flex;align-items:center;gap:8px;"><span class="category-count">' + matchingItems.length + '</span><span class="chev">▶</span></div>';
    head.addEventListener('click', () => {
      if (openCats.has(key)) openCats.delete(key); else openCats.add(key);
      renderMain();
    });
    catDiv.appendChild(head);

    const body = document.createElement('div');
    body.className = 'category-body';

    matchingItems.forEach(ii => {
      const item = cat.itens[ii];
      const row = document.createElement('div');
      const sel = isSelected(activeTab, ci, ii);
      row.className = 'item' + (sel ? ' selected' : '');
      let linhasHtml = item.linhas.map(l => '<div class="linha' + (isAviso(l) ? ' aviso' : '') + '">' + highlight(l, q) + '</div>').join('');
      let obsHtml = (item.obs && item.obs.length) ? item.obs.map(o => '<div class="obs"><span class="obs-tag">Obs.:</span>' + highlight(o, q) + '</div>').join('') : '';
      row.innerHTML = '<div class="box">' + (sel ? '✓' : '') + '</div><div class="text"><div class="nome">' + highlight(item.nome, q) + '</div>' + linhasHtml + obsHtml + '</div>';
      row.addEventListener('click', () => toggleItem(activeTab, ci, ii));
      body.appendChild(row);
    });

    catDiv.appendChild(body);
    main.appendChild(catDiv);
  });

  document.getElementById('searchMeta').textContent = q ? (totalMatches + ' resultado(s)') : '';

  if (data.length && totalMatches === 0 && q) {
    main.innerHTML = '<div class="empty-hint">Nenhum item encontrado para "' + escapeHtml(q) + '".</div>';
  }
}

const IMC_RANGES = [
  { min: -Infinity, max: 18.5, label: 'Abaixo do peso' },
  { min: 18.5, max: 25, label: 'Peso normal' },
  { min: 25, max: 30, label: 'Sobrepeso' },
  { min: 30, max: 35, label: 'Obesidade Grau I' },
  { min: 35, max: 40, label: 'Obesidade Grau II' },
  { min: 40, max: Infinity, label: 'Obesidade Grau III (mórbida)' }
];

function imcRangeLabel(min, max) {
  if (min === -Infinity) return '< ' + max;
  if (max === Infinity) return '≥ ' + min;
  return min + ' – ' + max;
}

function classifyImc(v) {
  return IMC_RANGES.find(r => v >= r.min && v < r.max) || IMC_RANGES[IMC_RANGES.length - 1];
}

function renderImc() {
  const main = document.getElementById('main');
  main.innerHTML =
    '<div class="imc-wrap">' +
      '<h2>Calculadora de IMC</h2>' +
      '<div class="imc-sub">Classificação segundo a Organização Mundial da Saúde (OMS).</div>' +
      '<div class="imc-fields">' +
        '<div class="imc-field"><label for="imcPeso">Peso (kg)</label><input id="imcPeso" type="number" step="0.1" min="0" placeholder="Ex: 78.5"></div>' +
        '<div class="imc-field"><label for="imcAltura">Altura (cm)</label><input id="imcAltura" type="number" step="0.1" min="0" placeholder="Ex: 172"></div>' +
      '</div>' +
      '<div class="imc-result" id="imcResult"><div class="valor">—</div><div class="classe">Informe peso e altura</div></div>' +
      '<table class="imc-table" id="imcTable"><thead><tr><th>IMC (kg/m²)</th><th>Classificação</th></tr></thead><tbody></tbody></table>' +
    '</div>';

  const pesoEl = document.getElementById('imcPeso');
  const alturaEl = document.getElementById('imcAltura');
  const resultEl = document.getElementById('imcResult');
  const tbody = document.querySelector('#imcTable tbody');

  IMC_RANGES.forEach(r => {
    const tr = document.createElement('tr');
    tr.dataset.label = r.label;
    tr.innerHTML = '<td>' + imcRangeLabel(r.min, r.max) + '</td><td>' + r.label + '</td>';
    tbody.appendChild(tr);
  });

  function update() {
    const peso = parseFloat(pesoEl.value);
    const alturaCm = parseFloat(alturaEl.value);
    tbody.querySelectorAll('tr').forEach(tr => tr.classList.remove('active-range'));
    if (!peso || !alturaCm || peso <= 0 || alturaCm <= 0) {
      resultEl.innerHTML = '<div class="valor">—</div><div class="classe">Informe peso e altura</div>';
      return;
    }
    const alturaM = alturaCm / 100;
    const imc = peso / (alturaM * alturaM);
    const cls = classifyImc(imc);
    resultEl.innerHTML = '<div class="valor">' + imc.toFixed(1) + '</div><div class="classe">' + cls.label + '</div>';
    tbody.querySelectorAll('tr').forEach(tr => {
      if (tr.dataset.label === cls.label) tr.classList.add('active-range');
    });
  }

  pesoEl.addEventListener('input', update);
  alturaEl.addEventListener('input', update);
}

function renderSelected() {
  const list = document.getElementById('selectedList');
  const countEl = document.getElementById('selCount');
  list.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'uso-continuo';
  header.textContent = 'USO CONTÍNUO';
  list.appendChild(header);

  if (selected.length === 0) {
    countEl.textContent = 'Nenhum item selecionado';
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.innerHTML = 'Marque itens na lista à esquerda.<br>Eles vão aparecer aqui, na ordem em que forem clicados, prontos para copiar de uma vez só.';
    list.appendChild(hint);
    return;
  }
  countEl.textContent = selected.length + ' item(ns) selecionado(s)';
  selected.forEach((s, pos) => {
    const div = document.createElement('div');
    div.className = 'sel-item';
    div.innerHTML = '<div class="num">' + (pos + 1) + '</div>' +
      '<div class="body"><div class="nome">' + escapeHtml(s.nome) + '</div><div class="cat">' + escapeHtml(s.categoria) + '</div></div>' +
      '<div class="actions">' +
        '<button title="Mover para cima" data-act="up">&#9650;</button>' +
        '<button title="Mover para baixo" data-act="down">&#9660;</button>' +
        '<button title="Remover" class="remove" data-act="rm">&times;</button>' +
      '</div>';
    div.querySelector('[data-act="up"]').addEventListener('click', (e) => { e.stopPropagation(); moveSelected(pos, -1); });
    div.querySelector('[data-act="down"]').addEventListener('click', (e) => { e.stopPropagation(); moveSelected(pos, 1); });
    div.querySelector('[data-act="rm"]').addEventListener('click', (e) => { e.stopPropagation(); removeSelected(pos); });
    list.appendChild(div);
  });
}

function buildText() {
  const corpo = selected.map(s => {
    return s.nome + '\n' + s.linhas.join('\n');
  }).join('\n\n');
  return 'USO CONTÍNUO\n\n' + corpo;
}

function copyToClipboard() {
  if (selected.length === 0) return;
  const text = buildText();
  const btn = document.getElementById('copyBtn');
  const done = () => {
    const original = 'Copiar receita';
    btn.textContent = 'Copiado! (' + selected.length + ' itens)';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1800);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); done(); } catch (e) { alert('Não foi possível copiar automaticamente. Selecione o texto manualmente.'); }
  document.body.removeChild(ta);
}

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('search').value = '';
    renderMain();
  });
});

document.getElementById('search').addEventListener('input', renderMain);
document.getElementById('expandAll').addEventListener('click', () => {
  currentData().forEach((c, ci) => openCats.add(activeTab + '-' + ci));
  renderMain();
});
document.getElementById('collapseAll').addEventListener('click', () => {
  currentData().forEach((c, ci) => openCats.delete(activeTab + '-' + ci));
  renderMain();
});
document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (selected.length === 0) return;
  if (confirm('Limpar todos os ' + selected.length + ' itens selecionados?')) {
    selected = [];
    renderMain();
    renderSelected();
  }
});

renderMain();
renderSelected();
</script>
